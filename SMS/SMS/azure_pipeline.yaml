trigger:
- main

pool:
  name: Default  # Or your self-hosted agent pool name

steps:
- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.11'         # Pick the Python version installed on your agent (3.9, 3.10, 3.11 etc.)
    addToPath: true

- script: |
    python --version
    python -m venv venv
    call venv\Scripts\activate
    pip install --upgrade pip
    pip install -r requirements.txt
  workingDirectory: $(Build.SourcesDirectory)\SMS
  displayName: 'Setup Python Environment & Install Dependencies'

